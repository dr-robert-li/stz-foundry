name: Release

# Push a version tag and CI does the rest: gate → npm publish with provenance →
# GitHub release. Tag must match package.json version (a guard checks it).
#
#   npm version patch        # bumps package.json + commits + tags vX.Y.Z
#   git push --follow-tags
#
# This repo publishes the **stz-foundry** package — a NEW npm package, distinct
# from the upstream `slice-tournament-zoo` release this project forked from.
# A name guard below hard-fails the run if package.json ever names anything
# else, so this workflow can never overwrite the upstream npm release.
#
# Auth: npm Trusted Publishing (OIDC, no token). One-time setup on npmjs.com is
# required for the new package: after the FIRST manual `npm publish` (or via
# granular token), configure Trusted Publishing for dr-robert-li/stz-foundry →
# .github/workflows/release.yml, then set "require 2FA and disallow tokens".
# `--provenance` stamps a verified link back to this commit+run.

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub release
  id-token: write   # OIDC for provenance (and Trusted Publishing)

jobs:
  release:
    name: publish + github release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # NOTE: no `registry-url:` — it injects a placeholder NODE_AUTH_TOKEN into
      # .npmrc that shadows OIDC and makes `npm publish` 404 under Trusted
      # Publishing. The default registry is npmjs; OIDC handles auth.
      # Node 24 ships npm >= 11 natively (Trusted Publishing needs npm >= 11.5.1).
      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # belt-and-suspenders: ensure a Trusted-Publishing-capable npm, and prove it
      - name: Ensure recent npm
        run: |
          npm install -g npm@latest
          echo "node $(node -v) / npm $(npm -v)"

      - name: Install dependencies
        run: npm ci

      # The eval sandbox (src/sandbox.ts) uses bwrap on Linux; installing it here
      # exercises the real OS-isolation path (and V8 coverage) in the gate rather
      # than the degraded permission-model fallback. Best-effort userns relax for
      # the AppArmor restriction on Ubuntu 24.04 runners.
      - name: Install bubblewrap (eval sandbox)
        run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Guard — this repo publishes stz-foundry, never the upstream package
        run: |
          NAME="$(node -p "require('./package.json').name")"
          if [ "$NAME" != "stz-foundry" ]; then
            echo "::error::package.json name is '$NAME'; this workflow only publishes 'stz-foundry'"; exit 1
          fi

      - name: Guard — tag matches package.json version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != package.json ${PKG}"; exit 1
          fi

      - name: Typecheck + test
        run: npm run typecheck && npm test

      - name: Publish to npm (Trusted Publishing OIDC + provenance)
        run: npm publish --provenance --access public

      - name: Extract changelog section
        id: notes
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v v="$VER" '
            $0 ~ "^## \\["v"\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          {
            echo "**npm:** https://www.npmjs.com/package/stz-foundry/v/$VER";
            echo "(\`npm i stz-foundry@$VER\` — published with provenance)";
          } >> RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
