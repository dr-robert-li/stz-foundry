name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: typecheck + tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Exercise the real bwrap eval-sandbox path (and V8 coverage) rather than
      # the degraded permission-model fallback. Best-effort userns relax for the
      # AppArmor restriction on Ubuntu 24.04 runners.
      - name: Install bubblewrap (eval sandbox)
        run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  # Exercise the macOS sandbox-exec (Seatbelt) eval-sandbox path — asserts the
  # OS-isolated coverage branch that Linux runners can't (see docs/TESTPLAN.md).
  test-macos:
    name: typecheck + tests (macOS, sandbox-exec)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
